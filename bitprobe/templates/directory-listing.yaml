id: directory-listing
name: Directory Listing Enabled
severity: low
description: |
  Web server is configured to show directory listings when no index file is present.
  This exposes file structure and may reveal sensitive files.
author: BitProbe Team
tags: [information-disclosure, directory, listing]

request:
  method: GET
  path: /
  headers:
    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.0

matchers:
  - type: word
    words:
      - "Index of /"
      - "Parent Directory"
      - "Directory Listing"
    condition: or
    part: body
  
  - type: status
    status:
      - 200

metadata:
  remediation: |
    Disable directory listing in your web server configuration:
    
    Apache: Add "Options -Indexes" to .htaccess or virtual host config
    Nginx: Remove "autoindex on;" from configuration
    
    Alternatively, create an index file (index.html, index.php, etc.) 
    in directories that don't have one.
